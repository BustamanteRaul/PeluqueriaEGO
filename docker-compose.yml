services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/peluqueria-ego
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:5173
      - NODE_ENV=development
    depends_on:
      - mongo

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo_data:
